<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Robloxia Horrors Wiki</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0b0b0b;
      color: #e6e6e6;
    }

    header {
      text-align: center;
      padding: 35px 20px 15px;
      border-bottom: 2px solid #5a0000;
      background-color: #0a0a0a;
    }

    header img {
      width: 85%;
      max-width: 900px;
      height: auto;
    }

    .subtitle {
      margin-top: 10px;
      color: #b3b3b3;
      font-size: 16px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background-color: #120000;
      border: 1px solid #3a0000;
      padding: 18px;
      border-radius: 6px;
    }

    .card h3 {
      margin-top: 0;
      color: #ff2a2a;
      border-bottom: 1px solid #3a0000;
      padding-bottom: 6px;
    }

    a {
      color: #ff5c5c;
      text-decoration: none;
      display: block;
      margin: 6px 0;
    }

    a:hover {
      color: #ff1a1a;
      text-decoration: underline;
    }

    .featured {
      margin-top: 30px;
      padding: 18px;
      background-color: #140000;
      border-left: 4px solid #b30000;
      border: 1px solid #3a0000;
    }

    .featured h2 {
      margin-top: 0;
      color: #ff2a2a;
    }

    footer {
      text-align: center;
      padding: 25px;
      font-size: 13px;
      color: #888;
      border-top: 1px solid #3a0000;
      margin-top: 40px;
    }

    .credits {
      margin-top: 8px;
      color: #aaa;
    }
  </style>
</head>

</html>
